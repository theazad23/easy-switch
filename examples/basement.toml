# Basement PC — triple-monitor setup.
# Copy to ~/.config/easy-switch/config.toml on the target host, then edit.
#
# Find output names: kscreen-doctor -o
# Find audio sinks: pactl list sinks short

[modes.couch]
description = "4K TV only"
requires_any = ["HDMI-A-1"]
strict = true
audio = "alsa_output.pci-0000_01_00.1.hdmi-stereo"

[modes.couch.outputs.HDMI-A-1]
enable = true
primary = true
mode = "3840x2160@60"

[modes.couch.outputs.DP-3]
enable = false

[modes.couch.outputs.DP-2]
enable = false


[modes.desk]
description = "DP-3 primary with DP-2 portrait"
requires_any = ["DP-3"]
strict = true
audio = "alsa_output.usb-SteelSeries_Arctis_Nova_Pro_Wireless-00.analog-stereo"

[modes.desk.outputs.DP-3]
enable = true
primary = true
mode = "2560x1440@165"
position = "1440,560"

[modes.desk.outputs.DP-2]
enable = true
mode = "2560x1440@144"
rotation = "right"
position = "0,0"

[modes.desk.outputs.HDMI-A-1]
enable = false


[modes.all]
description = "All three monitors, DP-3 primary"
requires_any = ["DP-3", "DP-2", "HDMI-A-1"]
strict = true
audio = "alsa_output.usb-SteelSeries_Arctis_Nova_Pro_Wireless-00.analog-stereo"

[modes.all.outputs.DP-3]
enable = true
primary = true
mode = "2560x1440@165"
position = "1440,2160"

[modes.all.outputs.HDMI-A-1]
enable = true
mode = "3840x2160@60"
position = "1440,0"

[modes.all.outputs.DP-2]
enable = true
mode = "2560x1440@144"
rotation = "right"
position = "0,1600"
